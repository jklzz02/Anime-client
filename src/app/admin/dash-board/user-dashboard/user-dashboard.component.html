<ng-template #usernameTpl let-user>
  <div class="flex items-center space-x-3">
    <div
      class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-light to-lavender-light dark:from-blue dark:to-lavender flex items-center justify-center text-white text-xs font-bold"
    >
      {{ user.username.charAt(0).toUpperCase() }}
    </div>
    <span class="font-medium">{{ user.username }}</span>
  </div>
</ng-template>

<ng-template #roleTpl let-user>
  <span
    class="px-2 py-1 rounded text-xs font-semibold"
    [ngClass]="{
      'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300':
        user.admin,
      'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300':
        !user.admin,
    }"
  >
    {{ user.admin ? "Admin" : "User" }}
  </span>
</ng-template>

<app-dashboard-table
  title="User Management"
  emptyMessage="No users found."
  [rowLink]="userRowLink"
  [columns]="columns"
  [data]="users"
  [currentPage]="currentPage"
  [maxPage]="maxPage"
  [hasNextPage]="hasNextPage"
  (nextPage)="onNextPage()"
  (previousPage)="onPreviousPage()"
/>
